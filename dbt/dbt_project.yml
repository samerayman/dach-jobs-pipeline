name: "dach_jobs"
version: "0.1.0"
config-version: 2

profile: "dach_jobs"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dach_jobs:
    staging:
      +materialized: view
      +schema: staging
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: table
      +schema: gold

snapshots:
  dach_jobs:
    +target_schema: snapshots
    +strategy: check
    +check_cols: ["title", "company_name", "remote", "location"]

vars:
  bronze_glob: "s3://bronze/arbeitnow/**/*.parquet"
