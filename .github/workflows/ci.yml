name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve,quality]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest --cov=ingestion --cov=dach_jobs --cov-report=term-missing

      # dbt manifest is required at import time by @dbt_assets.
      # Generate it before loading Definitions in CI.
      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .
      - name: dbt parse (generate manifest)
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt parse --target ci

      - name: Dagster definitions load
        env:
          DBT_PROFILES_DIR: "dbt"
        run: python -c "from dach_jobs import defs; assert defs"

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.8.7 dbt-duckdb==1.8.4
      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .
      - name: dbt parse (CI profile, in-memory)
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt parse --target ci
      - name: dbt compile
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt compile --target ci

  serve-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve]"
      - name: API imports
        run: python -c "from api.main import app; assert app"
      - name: Streamlit imports
        run: python -c "import importlib.util, sys; spec = importlib.util.spec_from_file_location('home', 'streamlit_app/Home.py'); m = importlib.util.module_from_spec(spec); sys.modules['home'] = m; spec.loader.exec_module(m)" || true
